name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'space/**'
      - 'scripts/update_space.py'
      - '.github/workflows/deploy-space.yml'
  workflow_dispatch:

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Deploy Space
        run: uv run --no-project --with pandas --with pyarrow --with requests --with huggingface_hub --with pillow --with numpy python scripts/update_space.py

      - name: Commit updated thumbnail
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet space/cover.jpeg || (
            git add space/cover.jpeg &&
            git commit -m "chore(space): update social thumbnail [skip ci]" &&
            git push
          )
