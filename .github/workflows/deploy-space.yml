name: Deploy Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'space/**'
      - 'results/**'
      - 'outputs/**'
      - 'scripts/update_space.py'
      - 'scripts/push_results.py'
      - 'scripts/push_outputs.py'
      - '.github/workflows/deploy-space.yml'
  workflow_dispatch:

jobs:
  deploy-space:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Push outputs to HF dataset
        run: uv run --no-project --with pandas --with pyarrow --with huggingface_hub python scripts/push_outputs.py
        continue-on-error: true

      - name: Push results to HF dataset
        run: uv run --no-project --with pandas --with pyarrow --with huggingface_hub python scripts/push_results.py

      - name: Deploy Space
        run: uv run --no-project --with pandas --with pyarrow --with requests --with huggingface_hub --with pillow --with numpy python scripts/update_space.py
